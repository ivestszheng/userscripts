name: Release & Build

on:
  # 1. 监听 main 分支的推送（用于触发版本更新）
  push:
    branches: [main]
  # 2. 允许手动触发（用于重试构建或强制全量构建）
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        default: "incremental"
        type: "choice"
        options:
          - "incremental"
          - "full"

permissions:
  contents: write

jobs:
  release-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout Code
        uses: actions/checkout@v4
        with:
          # 必须设置为 0，否则 Changesets 无法推送到远程创建 Tag
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      # --------------------------------------------------
      # 第一步：构建 (Build)
      # 必须在 Changesets Version 之前执行
      # 因为 Version 会清空 .changeset 文件夹
      # --------------------------------------------------
      - name: 🛠️ Build Packages
        id: build
        run: |
          # 1. 判断构建模式
          if [ "${{ github.event.inputs.build_mode }}" == "full" ]; then
            echo "🚀 Running Full Build Mode..."
            TARGET_PACKAGES=$(pnpm ls --depth -1 --parseable | xargs)
          else
            echo "⚡ Running Incremental Build Mode..."
            # 此时 .changeset 文件夹还未被清空，可以检测到变更
            TARGET_PACKAGES=$(pnpm changeset status --output-json | jq -r '.releases[].name' | xargs)
          fi

          # 2. 如果没有检测到包，直接退出（或者如果你想强制构建所有，可以在这里修改逻辑）
          if [ -z "$TARGET_PACKAGES" ]; then
            echo "ℹ️ No changes detected. Skipping build."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "📦 Target packages: $TARGET_PACKAGES"
          echo "list=$TARGET_PACKAGES" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT

      # 仅当有变更时才进行构建
      - name: 🛠️ Run Build Script
        if: ${{ steps.build.outputs.has_changes == 'true' }}
        run: pnpm --filter ${{ steps.build.outputs.list }} run build

      # --------------------------------------------------
      # 第二步：发布 (Release)
      # 运行 Changesets，这会自动创建 Tag
      # --------------------------------------------------
      - name: 📤 Create GitHub Release & Assets
        # 这个 Action 会自动处理 Tag，并生成特殊的 latest 链接
        uses: softprops/action-gh-release@v2
        with:
          # 关键配置：这会生成 changelog，同时激活特殊的下载路由
          generate_release_notes: true
          # 指定要上传的文件
          files: packages/*/dist/*.user.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}