name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for Changesets
        id: check-changesets
        run: |
          HAS_CHANGESETS=false
          if [ "$(ls -A .changeset/*.md 2>/dev/null | grep -v "README.md" | wc -l)" -gt 0 ]; then
            HAS_CHANGESETS=true
          fi
          
          echo "hasChangesets=${HAS_CHANGESETS}" >> $GITHUB_OUTPUT

      - name: Configure Git Credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Changeset Version
        id: changeset-version
        if: steps.check-changesets.outputs.hasChangesets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm changeset version
          
          UPDATED_PACKAGES=""
          for pkg_dir in userscripts/*; do
            if [ -d "$pkg_dir" ] && [ -f "$pkg_dir/package.json" ]; then
              if git status --porcelain | grep -q "$pkg_dir/package.json"; then
                pkg_name=$(basename "$pkg_dir")
                UPDATED_PACKAGES="$UPDATED_PACKAGES $pkg_name"
              fi
            fi
          done
          
          UPDATED_PACKAGES=$(echo "$UPDATED_PACKAGES" | xargs)
          echo "updatedPackages=$UPDATED_PACKAGES" >> $GITHUB_OUTPUT

      - name: Build All Packages
        run: |
          echo "=== Building all userscripts ==="
          pnpm --filter "./userscripts/*" run build

      - name: Debug - List Built Files
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          echo ""
          echo "=== All .user.js files ==="
          find . -name "*.user.js" -type f
          echo ""
          echo "=== userscripts dist directories ==="
          find userscripts -name "dist" -type d
          echo ""
          echo "=== userscripts dist contents ==="
          for d in userscripts/*/dist; do
            if [ -d "$d" ]; then
              echo "--- $d ---"
              ls -la "$d"
            fi
          done

      - name: Create Package Tags
        if: steps.check-changesets.outputs.hasChangesets == 'true'
        id: create-package-tags
        run: |
          TAGS_CREATED=""
          
          for pkg_dir in userscripts/*; do
            if [ -d "$pkg_dir" ] && [ -f "$pkg_dir/package.json" ]; then
              pkg_name=$(basename "$pkg_dir")
              version=$(jq -r '.version' "$pkg_dir/package.json")
              tag_name="${pkg_name}@${version}"
              
              if ! git rev-parse "$tag_name" >/dev/null 2>&1; then
                git tag -a "$tag_name" -m "Release ${pkg_name}@${version}"
                TAGS_CREATED="$TAGS_CREATED $tag_name"
                echo "Created tag: $tag_name"
              fi
            fi
          done
          
          if [ -n "$TAGS_CREATED" ]; then
            echo "tagsCreated=true" >> $GITHUB_OUTPUT
            echo "tagList=$TAGS_CREATED" >> $GITHUB_OUTPUT
          else
            echo "tagsCreated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit Changes
        if: steps.check-changesets.outputs.hasChangesets == 'true'
        run: |
          git add .
          git commit -m "chore: version packages [skip ci]"

      - name: Create latest Tag
        run: |
          git tag -d latest 2>/dev/null || true
          git push origin :latest 2>/dev/null || true
          git tag -a latest -m "Latest Release"
          echo "Created latest tag"

      - name: Push Changes and Tags
        if: steps.check-changesets.outputs.hasChangesets == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true

      - name: Push latest Tag Only
        if: steps.check-changesets.outputs.hasChangesets != 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true

      - name: Create Releases for Updated Packages
        if: steps.check-changesets.outputs.hasChangesets == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const tagList = '${{ steps.create-package-tags.outputs.tagList }}'.trim();
            if (!tagList) {
              console.log('No tags created, skipping package releases');
              return;
            }
            
            const tags = tagList.split(' ').filter(t => t);
            
            for (const tag of tags) {
              const [pkgName, version] = tag.split('@');
              const pkgDir = `userscripts/${pkgName}`;
              const changelogPath = path.join(pkgDir, 'CHANGELOG.md');
              
              let body = '';
              if (fs.existsSync(changelogPath)) {
                const changelog = fs.readFileSync(changelogPath, 'utf-8');
                const versionMatch = changelog.match(new RegExp(`## \\[?${version}\\]?[\\s\\S]*?(?=## \\[|$)`));
                if (versionMatch) {
                  body = versionMatch[0];
                }
              }
              
              const { data: release } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `${pkgName}@${version}`,
                body: body || `Release ${pkgName}@${version}`,
              });
              
              console.log(`Created release for ${tag}`);
              
              const distDir = path.join(pkgDir, 'dist');
              if (fs.existsSync(distDir)) {
                const files = fs.readdirSync(distDir);
                for (const file of files) {
                  if (file.endsWith('.user.js')) {
                    const filePath = path.join(distDir, file);
                    const content = fs.readFileSync(filePath);
                    
                    await github.rest.repos.uploadReleaseAsset({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      release_id: release.id,
                      name: file,
                      data: content,
                    });
                    console.log(`Uploaded ${file} to ${tag} release`);
                  }
                }
              }
            }

      - name: Generate latest Release Body
        id: generate-latest-body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const updatedPackages = '${{ steps.changeset-version.outputs.updatedPackages }}'.trim();
            let body = `This release always contains the latest version of all userscripts.\n\n`;
            
            if (updatedPackages) {
              const packages = updatedPackages.split(' ').filter(p => p);
              body += `## Updated Packages\n\n`;
              for (const pkgName of packages) {
                const pkgDir = `userscripts/${pkgName}`;
                const pkgJson = JSON.parse(fs.readFileSync(path.join(pkgDir, 'package.json'), 'utf-8'));
                body += `- ${pkgName}@${pkgJson.version}\n`;
              }
              body += `\n`;
            }
            
            body += `## All Scripts\n\n`;
            
            for (const pkgDir of fs.readdirSync('userscripts')) {
              const fullPath = path.join('userscripts', pkgDir);
              if (fs.statSync(fullPath).isDirectory() && fs.existsSync(path.join(fullPath, 'package.json'))) {
                const pkgJson = JSON.parse(fs.readFileSync(path.join(fullPath, 'package.json'), 'utf-8'));
                const changelogPath = path.join(fullPath, 'CHANGELOG.md');
                if (fs.existsSync(changelogPath)) {
                  body += `- [${pkgDir}@${pkgJson.version}](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/userscripts/${pkgDir}/CHANGELOG.md)\n`;
                } else {
                  body += `- ${pkgDir}@${pkgJson.version}\n`;
                }
              }
            }
            
            body += `\nDownload the .user.js files from Assets below.`;
            
            fs.writeFileSync('LATEST_RELEASE_BODY.md', body);

      - name: Create/Update latest Release
        uses: softprops/action-gh-release@v3
        with:
          files: userscripts/*/dist/*.user.js
          tag_name: latest
          name: Latest Release
          body_path: LATEST_RELEASE_BODY.md
          fail_on_unmatched_files: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
