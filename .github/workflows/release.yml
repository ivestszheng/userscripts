name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        required: true
        default: "auto"
        type: choice
        options:
          - "auto"
          - "force"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for Changesets or Force Build
        id: check-changesets
        run: |
          HAS_CHANGESETS=false
          if [ "$(ls -A .changeset/*.md 2>/dev/null | grep -v "README.md" | wc -l)" -gt 0 ]; then
            HAS_CHANGESETS=true
          fi
          
          FORCE_BUILD=false
          if [ "${{ github.event.inputs.build_mode }}" = "force" ]; then
            FORCE_BUILD=true
          fi
          
          echo "hasChangesets=${HAS_CHANGESETS}" >> $GITHUB_OUTPUT
          echo "forceBuild=${FORCE_BUILD}" >> $GITHUB_OUTPUT
          
          if [ "$HAS_CHANGESETS" = "true" ] || [ "$FORCE_BUILD" = "true" ]; then
            echo "shouldBuild=true" >> $GITHUB_OUTPUT
          else
            echo "shouldBuild=false" >> $GITHUB_OUTPUT
          fi

      - name: Get Affected Packages (before version)
        id: affected-packages
        if: steps.check-changesets.outputs.shouldBuild == 'true' && steps.check-changesets.outputs.hasChangesets == 'true'
        run: |
          # 在运行 changeset version 之前，先保存受影响的包
          CHANGED_PACKAGES=$(pnpm changeset status --output-json | jq -r '.releases[].name' || true)
          echo "changedPackages=${CHANGED_PACKAGES}" >> $GITHUB_OUTPUT

      - name: Configure Git Credentials
        if: steps.check-changesets.outputs.shouldBuild == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Changeset Version
        if: steps.check-changesets.outputs.hasChangesets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm changeset version

      - name: Build Packages
        if: steps.check-changesets.outputs.shouldBuild == 'true'
        run: |
          if [ "${{ steps.check-changesets.outputs.forceBuild }}" = "true" ]; then
            echo "=== Force build: building all userscripts ==="
            pnpm --filter "./userscripts/*" run build
          else
            CHANGED_PACKAGES="${{ steps.affected-packages.outputs.changedPackages }}"
            if [ -z "$CHANGED_PACKAGES" ]; then
              echo "=== No affected packages found, building all userscripts ==="
              pnpm --filter "./userscripts/*" run build
            else
              echo "=== Incremental build: building affected packages ==="
              for pkg in $CHANGED_PACKAGES; do
                echo "Building $pkg..."
                pnpm --filter "$pkg" run build
              done
            fi
          fi

      - name: Debug - List Built Files
        if: steps.check-changesets.outputs.shouldBuild == 'true'
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          echo ""
          echo "=== All .user.js files ==="
          find . -name "*.user.js" -type f
          echo ""
          echo "=== userscripts dist directories ==="
          find userscripts -name "dist" -type d
          echo ""
          echo "=== userscripts dist contents ==="
          for d in userscripts/*/dist; do
            if [ -d "$d" ]; then
              echo "--- $d ---"
              ls -la "$d"
            fi
          done

      - name: Create Package Tags
        if: steps.check-changesets.outputs.hasChangesets == 'true'
        id: create-package-tags
        run: |
          TAGS_CREATED=""
          
          for pkg_dir in userscripts/*; do
            if [ -d "$pkg_dir" ] && [ -f "$pkg_dir/package.json" ]; then
              pkg_name=$(basename "$pkg_dir")
              version=$(jq -r '.version' "$pkg_dir/package.json")
              tag_name="${pkg_name}@${version}"
              
              if ! git rev-parse "$tag_name" >/dev/null 2>&1; then
                git tag -a "$tag_name" -m "Release ${pkg_name}@${version}"
                TAGS_CREATED="$TAGS_CREATED $tag_name"
                echo "Created tag: $tag_name"
              fi
            fi
          done
          
          if [ -n "$TAGS_CREATED" ]; then
            echo "tagsCreated=true" >> $GITHUB_OUTPUT
            echo "tagList=$TAGS_CREATED" >> $GITHUB_OUTPUT
          else
            echo "tagsCreated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit Changes
        if: steps.check-changesets.outputs.hasChangesets == 'true'
        run: |
          git add .
          git commit -m "chore: version packages [skip ci]"

      - name: Create latest Tag
        if: steps.check-changesets.outputs.shouldBuild == 'true'
        run: |
          # Delete existing latest tag
          git tag -d latest 2>/dev/null || true
          git push origin :latest 2>/dev/null || true
          
          # Create new latest tag
          git tag -a latest -m "Latest Release"
          echo "Created latest tag"

      - name: Push Changes and Tags
        if: steps.check-changesets.outputs.hasChangesets == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true

      - name: Push latest Tag Only (Force Build)
        if: steps.check-changesets.outputs.forceBuild == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true

      - name: Create/Update latest Release
        if: steps.check-changesets.outputs.shouldBuild == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: userscripts/*/dist/*.user.js
          tag_name: latest
          name: Latest Release
          body: |
            This release always contains the latest version of all userscripts.
            
            Direct download links:
            - [bilibili-enhancer.user.js](https://github.com/${{ github.repository }}/releases/latest/download/bilibili-enhancer.user.js)
            - [bilibili-enhancer.user.js (Raw)](https://raw.githubusercontent.com/${{ github.repository }}/dist/bilibili-enhancer/bilibili-enhancer.user.js)
          fail_on_unmatched_files: false
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to dist Branch
        if: steps.check-changesets.outputs.shouldBuild == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deploying all dist files to dist branch..."
          
          # 使用带 token 的 URL
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          
          # 克隆 dist 分支到临时目录
          git clone --depth 1 --branch dist $REPO_URL dist-temp 2>/dev/null || \
            git clone --depth 1 --orphan dist $REPO_URL dist-temp 2>/dev/null || \
            mkdir -p dist-temp
            
          cd dist-temp
          
          # 配置 git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 清空旧文件
          rm -rf *
          
          # 复制所有构建产物
          for pkg_dir in ../userscripts/*; do
            if [ -d "$pkg_dir" ] && [ -f "$pkg_dir/package.json" ]; then
              pkg_name=$(basename "$pkg_dir")
              dist_file="$pkg_dir/dist/${pkg_name}.user.js"
              
              if [ -f "$dist_file" ]; then
                cp "$dist_file" "./${pkg_name}.user.js"
                echo "Copied ${pkg_name}.user.js"
              fi
            fi
          done
          
          # 提交并推送
          git add *.user.js
          git commit -m "chore: update dist files to latest version [skip ci]" || true
          git push origin dist --force
          
          cd ..
          rm -rf dist-temp
          
          echo "Deployed to dist branch successfully!"
