name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for Changesets and Code Changes
        id: check-changes
        run: |
          # 检查是否有 changesets
          HAS_CHANGESETS=false
          if [ "$(ls -A .changeset/*.md 2>/dev/null | grep -v "README.md" | wc -l)" -gt 0 ]; then
            HAS_CHANGESETS=true
          fi
          
          echo "hasChangesets=${HAS_CHANGESETS}" >> $GITHUB_OUTPUT
          
          # 获取当前 commit 和上一个 commit 的比较
          # 获取当前分支的最新 commit
          CURRENT_COMMIT=$(git rev-parse HEAD)
          
          # 获取上一个 commit（如果有）
          PREVIOUS_COMMIT=$(git rev-parse HEAD^ 2>/dev/null || echo "")
          
          if [[ -z "$PREVIOUS_COMMIT" ]]; then
            echo "No previous commit, building all packages"
            echo "changedPackages=" >> $GITHUB_OUTPUT
            echo "buildAll=true" >> $GITHUB_OUTPUT
          else
            # 检查 userscripts/ 目录下哪些包有变化
            CHANGED_PACKAGES=""
            
            # 获取 userscripts/ 目录下有变化的文件
            CHANGED_FILES=$(git diff --name-only "$PREVIOUS_COMMIT" "$CURRENT_COMMIT" -- userscripts/ || echo "")
            
            if [[ -z "$CHANGED_FILES" ]]; then
              echo "No files changed in userscripts directory"
              echo "changedPackages=" >> $GITHUB_OUTPUT
              echo "buildAll=false" >> $GITHUB_OUTPUT
            else
              # 提取变化的包名
              while read -r file; do
                if [[ "$file" =~ ^userscripts/([^/]+)/ ]]; then
                  pkg_name="${BASH_REMATCH[1]}"
                  if [[ ! " $CHANGED_PACKAGES " =~ " $pkg_name " ]]; then
                    CHANGED_PACKAGES="$CHANGED_PACKAGES $pkg_name"
                  fi
                fi
              done <<< "$CHANGED_FILES"
              
              CHANGED_PACKAGES=$(echo "$CHANGED_PACKAGES" | xargs)
              echo "Changed packages: $CHANGED_PACKAGES"
              echo "changedPackages=$CHANGED_PACKAGES" >> $GITHUB_OUTPUT
              echo "buildAll=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Configure Git Credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Changeset Version
        id: changeset-version
        if: steps.check-changes.outputs.hasChangesets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 运行 changeset version 并保存输出
          OUTPUT=$(pnpm changeset version 2>&1)
          echo "${OUTPUT}"
          
          # 提取有更新的包
          UPDATED_PACKAGES=""
          
          # 从输出中提取包名
          while read -r line; do
            if [[ "$line" =~ userscripts/([^/]+)/package.json ]]; then
              pkg_name="${BASH_REMATCH[1]}"
              UPDATED_PACKAGES="$UPDATED_PACKAGES $pkg_name"
            fi
          done <<< "$OUTPUT"
          
          # 如果没有从输出中提取不到，检查 package.json 的变化
          if [[ -z "$UPDATED_PACKAGES" ]]; then
            for pkg_dir in userscripts/*; do
              if [[ -d "$pkg_dir" && -f "$pkg_dir/package.json" ]]; then
                if git status --porcelain | grep -q "$pkg_dir/package.json"; then
                  pkg_name=$(basename "$pkg_dir")
                  UPDATED_PACKAGES="$UPDATED_PACKAGES $pkg_name"
                fi
              fi
            done
          fi
          
          UPDATED_PACKAGES=$(echo "$UPDATED_PACKAGES" | xargs)
          echo "updatedPackages=$UPDATED_PACKAGES" >> $GITHUB_OUTPUT

      - name: Build Packages
        id: build-packages
        run: |
          # 确定需要构建的包
          BUILD_ALL=false
          PACKAGES_TO_BUILD=""
          
          if [[ "${{ steps.check-changes.outputs.hasChangesets }}" == "true" ]]; then
            # 有 changesets，使用 changeset-version 的输出
            PACKAGES_TO_BUILD="${{ steps.changeset-version.outputs.updatedPackages }}"
            if [[ -z "$PACKAGES_TO_BUILD" ]]; then
              BUILD_ALL=true
            fi
          else
            # 没有 changesets，使用 git diff 的输出
            PACKAGES_TO_BUILD="${{ steps.check-changes.outputs.changedPackages }}"
            if [[ "${{ steps.check-changes.outputs.buildAll }}" == "true" ]]; then
              BUILD_ALL=true
            fi
          fi
          
          if [[ "$BUILD_ALL" == "true" || -z "$PACKAGES_TO_BUILD" ]]; then
            echo "Building all packages"
            pnpm --filter "./userscripts/*" run build
            echo "builtAll=true" >> $GITHUB_OUTPUT
          else
            echo "Building packages: $PACKAGES_TO_BUILD"
            for pkg in $PACKAGES_TO_BUILD; do
              pnpm --filter "./userscripts/$pkg" run build
            done
            echo "builtAll=false" >> $GITHUB_OUTPUT
            echo "builtPackages=$PACKAGES_TO_BUILD" >> $GITHUB_OUTPUT
          fi

      - name: Debug - List Built Files
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          echo ""
          echo "=== All .user.js files ==="
          find . -name "*.user.js" -type f
          echo ""
          echo "=== userscripts dist directories ==="
          find userscripts -name "dist" -type d
          echo ""
          echo "=== userscripts dist contents ==="
          for d in userscripts/*/dist; do
            if [ -d "$d" ]; then
              echo "--- $d ---"
              ls -la "$d"
            fi
          done

      - name: Create Package Tags
        if: steps.check-changes.outputs.hasChangesets == 'true'
        id: create-package-tags
        run: |
          TAGS_CREATED=""
          
          for pkg_dir in userscripts/*; do
            if [ -d "$pkg_dir" ] && [ -f "$pkg_dir/package.json" ]; then
              pkg_name=$(basename "$pkg_dir")
              version=$(jq -r '.version' "$pkg_dir/package.json")
              tag_name="${pkg_name}@${version}"
              
              if ! git rev-parse "$tag_name" >/dev/null 2>&1; then
                git tag -a "$tag_name" -m "Release ${pkg_name}@${version}"
                TAGS_CREATED="$TAGS_CREATED $tag_name"
                echo "Created tag: $tag_name"
              fi
            fi
          done
          
          if [ -n "$TAGS_CREATED" ]; then
            echo "tagsCreated=true" >> $GITHUB_OUTPUT
            echo "tagList=$TAGS_CREATED" >> $GITHUB_OUTPUT
          else
            echo "tagsCreated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit Changes
        if: steps.check-changes.outputs.hasChangesets == 'true'
        run: |
          git add .
          git commit -m "chore: version packages [skip ci]"

      - name: Create latest Tag
        run: |
          # Delete existing latest tag
          git tag -d latest 2>/dev/null || true
          git push origin :latest 2>/dev/null || true
          
          # Create new latest tag
          git tag -a latest -m "Latest Release"
          echo "Created latest tag"

      - name: Push Changes and Tags
        if: steps.check-changes.outputs.hasChangesets == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true

      - name: Push latest Tag Only
        if: steps.check-changes.outputs.hasChangesets != 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true

      - name: Create Releases for Updated Packages
        if: steps.check-changes.outputs.hasChangesets == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const tagList = `${{ steps.create-package-tags.outputs.tagList }}`.trim();
            if (!tagList) {
              console.log('No tags created, skipping package releases');
              return;
            }
            
            const tags = tagList.split(' ').filter(t => t);
            
            for (const tag of tags) {
              const [pkgName, version] = tag.split('@');
              const pkgDir = `userscripts/${pkgName}`;
              const changelogPath = path.join(pkgDir, 'CHANGELOG.md');
              
              let body = '';
              if (fs.existsSync(changelogPath)) {
                const changelog = fs.readFileSync(changelogPath, 'utf-8');
                const versionMatch = changelog.match(new RegExp(`## \\[?${version}\\]?[\\s\\S]*?(?=## \\[|$)`));
                if (versionMatch) {
                  body = versionMatch[0];
                }
              }
              
              const { data: release } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `${pkgName}@${version}`,
                body: body || `Release ${pkgName}@${version}`,
                generate_release_notes: true,
              });
              
              console.log(`Created release for ${tag}`);
              
              const userJsFiles = await glob(`${pkgDir}/dist/*.user.js`);
              for (const file of userJsFiles) {
                const content = fs.readFileSync(file);
                const fileName = path.basename(file);
                
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  name: fileName,
                  data: content,
                });
                console.log(`Uploaded ${fileName} to ${tag} release`);
              }
            }

      - name: Create/Update latest Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const builtAll = ${{ steps.build-packages.outputs.builtAll }} === 'true';
            const builtPackages = '${{ steps.build-packages.outputs.builtPackages }}'.trim();
            
            // 查找或创建 latest release
            let release;
            const { data: releases } = await github.rest.repos.listReleases({ owner, repo });
            const existingRelease = releases.find(r => r.tag_name === 'latest');
            
            if (existingRelease) {
              release = existingRelease;
              console.log('Found existing latest release');
            } else {
              const { data: newRelease } = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: 'latest',
                name: 'Latest Release',
                body: 'This release always contains the latest version of all userscripts.\n\nDownload the .user.js files from Assets below.',
                make_latest: 'true',
                generate_release_notes: true,
              });
              release = newRelease;
              console.log('Created new latest release');
            }
            
            // 收集所有需要上传的文件
            const filesToUpload = [];
            
            if (builtAll) {
              // 如果全量构建，删除所有旧 assets 并上传所有新的
              console.log('Full build, replacing all assets');
              
              for (const asset of release.assets || []) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
                console.log(`Deleted asset: ${asset.name}`);
              }
              
              // 上传所有包
              for (const pkgDir of fs.readdirSync('userscripts')) {
                const fullPkgDir = path.join('userscripts', pkgDir);
                if (fs.statSync(fullPkgDir).isDirectory()) {
                  const distDir = path.join(fullPkgDir, 'dist');
                  if (fs.existsSync(distDir)) {
                    for (const file of fs.readdirSync(distDir)) {
                      if (file.endsWith('.user.js')) {
                        filesToUpload.push(path.join(distDir, file));
                      }
                    }
                  }
                }
              }
            } else {
              // 如果只构建了部分包，只更新这些包的 assets
              console.log(`Partial build, updating packages: ${builtPackages}`);
              
              const packagesToUpdate = builtPackages.split(' ').filter(p => p);
              
              for (const pkgName of packagesToUpdate) {
                const pkgDir = path.join('userscripts', pkgName);
                const distDir = path.join(pkgDir, 'dist');
                
                if (fs.existsSync(distDir)) {
                  // 删除这个包的旧 assets
                  const pkgPrefix = `${pkgName}.`;
                  for (const asset of release.assets || []) {
                    if (asset.name.startsWith(pkgPrefix) || asset.name === `${pkgName}.user.js`) {
                      await github.rest.repos.deleteReleaseAsset({
                        owner,
                        repo,
                        asset_id: asset.id,
                      });
                      console.log(`Deleted old asset: ${asset.name}`);
                    }
                  }
                  
                  // 上传新文件
                  for (const file of fs.readdirSync(distDir)) {
                    if (file.endsWith('.user.js')) {
                      filesToUpload.push(path.join(distDir, file));
                    }
                  }
                }
              }
            }
            
            // 上传文件
            for (const filePath of filesToUpload) {
              const content = fs.readFileSync(filePath);
              const fileName = path.basename(filePath);
              
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.id,
                name: fileName,
                data: content,
              });
              console.log(`Uploaded asset: ${fileName}`);
            }
            
            console.log('Successfully updated latest release');
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
