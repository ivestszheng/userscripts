name: Release and Deploy

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_full_build:
        description: 'Force build all packages (ignore changeset status)'
        required: false
        default: 'false'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 👇 新增：安装 jq
      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Build & Deploy
    needs: release
    if: >-
      ${{ 
        github.event_name == 'workflow_dispatch' || 
        (github.event_name == 'push' && needs.release.outputs.published == 'true') 
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 👇 新增：安装 jq
      - name: Install jq
        run: sudo apt-get install jq -y

      # --- 获取受影响的包 ---
      - name: Get affected packages
        id: affected
        run: |
          if [ "${{ github.event.inputs.force_full_build }}" == "true" ]; then
            echo "Running full build..."
            # 👇 优化：使用 pnpm 列出所有 workspace 包，更通用
            ALL_PACKAGES=$(pnpm ls --depth -1 --parseable | xargs)
            echo "list=$ALL_PACKAGES" >> $GITHUB_OUTPUT
          else
            AFFECTED=$(pnpm changeset status --output-json | jq -r '.releases[].name' | xargs)
            echo "list=$AFFECTED" >> $GITHUB_OUTPUT
          fi

      - name: Clean Dist Directory
        if: ${{ steps.affected.outputs.list != '' }}
        run: |
          # 强制清理旧构建产物，防止上传残留文件
          rm -rf dist
          mkdir dist

      - name: Build Affected Packages
        if: ${{ steps.affected.outputs.list != '' }}
        run: |
          pnpm --filter ${{ steps.affected.outputs.list }} run build

      # --- 上传到 GitHub Release (Latest) ---
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: ${{ steps.affected.outputs.list != '' }}
        with:
          files: dist/*/*.user.js
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
